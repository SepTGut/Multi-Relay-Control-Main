<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom WLED Pro Dashboard</title>
<style>
body { font-family: Arial; background:#111; color:#eee; margin:0; }
header { background:#1e1e1e; padding:10px; display:flex; justify-content:space-between; align-items:center; }
button { padding:8px 12px; margin:4px; cursor:pointer; border:none; border-radius:4px; }
input, select { width:100%; padding:6px; margin:6px 0; }
.tab { display:none; padding:15px; }
.tab-buttons { display:flex; background:#222; }
.tab-buttons button { flex:1; background:#222; color:#aaa; }
.tab-buttons button.active { background:#333; color:#fff; }
.section { margin-bottom:15px; background:#1c1c1c; padding:10px; border-radius:6px; }
.section h3 { margin:0 0 8px 0; cursor:pointer; }
.hidden { display:none; }
.slider { width:100%; }
.relay-btn { width:100px; }
.status { font-size:12px; }
canvas { width:100%; border-radius:4px; }
</style>
</head>
<body>

<header>
  <div>
    IP: <input id="ipInput" placeholder="192.168.1.10" style="width:140px;">
    <button onclick="connect()">Connect</button>
  </div>
  <div class="status" id="status">Disconnected</div>
</header>

<div class="tab-buttons">
  <button onclick="openTab('lights')" class="active">Lights</button>
  <button onclick="openTab('relays')">Relays</button>
  <button onclick="openTab('audio')">Audio</button>
  <button onclick="openTab('system')">System</button>
</div>

<!-- LIGHTS TAB -->
<div id="lights" class="tab" style="display:block;">

  <div class="section">
    <h3 onclick="toggleSection(this)">Main Control</h3>
    <div>
      <button onclick="togglePower()">Power</button>
      Brightness
      <input type="range" min="0" max="255" id="briSlider"
        oninput="updateBrightness(this.value)">
    </div>
  </div>

  <div class="section">
    <h3 onclick="toggleSection(this)">Effects</h3>
    <div>
      Effect
      <select id="effectSelect" onchange="changeEffect(this.value)"></select>

      Palette
      <select id="paletteSelect" onchange="changePalette(this.value)"></select>

      <canvas id="palettePreview" height="20"></canvas>

      Speed
      <input type="range" min="0" max="255" id="speedSlider"
        oninput="updateSegment('sx', this.value)">

      Intensity
      <input type="range" min="0" max="255" id="intSlider"
        oninput="updateSegment('ix', this.value)">

      <div id="dynamicControls"></div>
    </div>
  </div>
</div>

<!-- RELAYS TAB -->
<div id="relays" class="tab"></div>

<!-- AUDIO TAB -->
<div id="audio" class="tab">
  <div class="section" id="audioSection"></div>
</div>

<!-- SYSTEM TAB -->
<div id="system" class="tab">
  <div class="section" id="systemInfo"></div>
</div>

<script>
let baseURL = "";
let state = {};
let cfg = {};
let fxdata = [];
let palx = {};
let ws;

function openTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.querySelectorAll(".tab-buttons button").forEach(b=>b.classList.remove("active"));
  document.getElementById(name).style.display="block";
  event.target.classList.add("active");
}

function toggleSection(el){
  el.nextElementSibling.classList.toggle("hidden");
}

async function connect(){
  const ip = document.getElementById("ipInput").value;
  const protocol = location.protocol === "https:" ? "https" : "http";
  baseURL = `${protocol}://${ip}`;

  try{
    await loadAll();
    startWebSocket();
  }catch(e){
    document.getElementById("status").innerText="Connection Failed";
  }
}

async function loadAll(){
  state = await fetch(`${baseURL}/json/si`).then(r=>r.json());
  const effects = await fetch(`${baseURL}/json/eff`).then(r=>r.json());
  const palettes = await fetch(`${baseURL}/json/pal`).then(r=>r.json());
  fxdata = await fetch(`${baseURL}/json/fxdata`).then(r=>r.json());
  palx = await fetch(`${baseURL}/json/palx`).then(r=>r.json());
  cfg = await fetch(`${baseURL}/json/cfg`).then(r=>r.json());

  populateSelect("effectSelect", effects);
  populateSelect("paletteSelect", palettes);

  buildRelayPanel();
  buildAudioPanel();
  buildSystemInfo();
  updateUI();
}

function populateSelect(id, arr){
  const sel = document.getElementById(id);
  sel.innerHTML="";
  arr.forEach((name,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=name;
    sel.appendChild(opt);
  });
}

function updateUI(){
  const seg = state.state.seg[0];
  document.getElementById("briSlider").value = state.state.bri;
  document.getElementById("effectSelect").value = seg.fx;
  document.getElementById("paletteSelect").value = seg.pal;
  document.getElementById("speedSlider").value = seg.sx;
  document.getElementById("intSlider").value = seg.ix;
  renderPalettePreview(seg.pal);
  updateDynamicControls();
}

function sendJSON(obj){
  fetch(`${baseURL}/json`,{
    method:"POST",
    body:JSON.stringify(obj)
  });
}

function togglePower(){
  sendJSON({on: !state.state.on});
}

function updateBrightness(val){
  sendJSON({bri: parseInt(val)});
}

function changeEffect(val){
  sendJSON({seg:[{fx: parseInt(val)}]});
}

function changePalette(val){
  renderPalettePreview(val);
  sendJSON({seg:[{pal: parseInt(val)}]});
}

function updateSegment(key,val){
  sendJSON({seg:[{[key]:parseInt(val)}]});
}

function renderPalettePreview(index){
  if(!palx?.p[index]) return;

  const canvas = document.getElementById("palettePreview");
  const ctx = canvas.getContext("2d");
  canvas.width = canvas.offsetWidth;

  const gradient = ctx.createLinearGradient(0,0,canvas.width,0);

  palx.p[index].forEach(stop=>{
    const pos = stop[0]/255;
    const color = `rgb(${stop[1]},${stop[2]},${stop[3]})`;
    gradient.addColorStop(pos,color);
  });

  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,20);
}

function updateDynamicControls(){
  const seg = state.state.seg[0];
  const definition = fxdata[seg.fx];
  const container = document.getElementById("dynamicControls");
  container.innerHTML="";
  if(!definition) return;

  const labels = definition.split(";")[0].split(",");

  labels.forEach((label,i)=>{
    if(label==="!" || label.trim()==="") return;

    const slider=document.createElement("input");
    slider.type="range";
    slider.min=0;
    slider.max=255;
    slider.value = seg[`c${i+1}`] || 0;

    slider.oninput = (e)=>{
      sendJSON({seg:[{[`c${i+1}`]: parseInt(e.target.value)}]});
    };

    const wrapper=document.createElement("div");
    wrapper.innerHTML=`${label}`;
    wrapper.appendChild(slider);
    container.appendChild(wrapper);
  });
}

function buildRelayPanel(){
  const container = document.getElementById("relays");
  container.innerHTML="";
  if(!cfg.um?.MultiRelay?.enabled){
    container.innerHTML="No relays enabled.";
    return;
  }

  state.state.MultiRelay.relays.forEach((r,i)=>{
    const btn=document.createElement("button");
    btn.className="relay-btn";
    btn.innerText=`Relay ${i} ${r.state?'ON':'OFF'}`;
    btn.style.background = r.state ? "#0a0" : "#333";
    btn.onclick=()=>sendJSON({MultiRelay:{relay:i,on:!r.state}});
    container.appendChild(btn);
  });
}

function buildAudioPanel(){
  const el=document.getElementById("audioSection");
  if(cfg.um?.AudioReactive?.enabled){
    el.innerHTML="Audio Reactive Enabled";
  }else{
    el.innerHTML="Audio Disabled";
  }
}

function buildSystemInfo(){
  const el=document.getElementById("systemInfo");
  el.innerHTML=`
    Name: ${state.info.name}<br>
    IP: ${state.info.ip}<br>
    LEDs: ${state.info.leds.count}<br>
    WiFi Signal: ${state.info.wifi.signal}%<br>
    Version: ${state.info.ver}
  `;
}

function startWebSocket(){
  const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${wsProtocol}://${document.getElementById("ipInput").value}/ws`);

  ws.onopen = ()=>document.getElementById("status").innerText="Live Connected";

  ws.onmessage = (event)=>{
    const data = JSON.parse(event.data);
    if(data.state){
      state.state = data.state;
      updateUI();
      buildRelayPanel();
    }
  };

  ws.onclose = ()=>document.getElementById("status").innerText="Disconnected";
}
</script>

</body>
</html>
