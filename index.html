<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLED 4-Relay HTTP Control</title>

<style>
:root {
  --bg: #0b1120;
  --card: #111827;
  --input: #0f172a;
  --border: #1f2937;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --on: #22c55e;
  --off: #ef4444;
  --warn: #f59e0b;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b1120, #020617);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 50px 20px;
}

.container {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-top: 0;
}

.status-bar {
  text-align: center;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-weight: bold;
}

.connected { background: rgba(34,197,94,0.2); color: var(--on); }
.disconnected { background: rgba(239,68,68,0.2); color: var(--off); }
.connecting { background: rgba(245,158,11,0.2); color: var(--warn); }

label {
  font-size: 14px;
  color: var(--muted);
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 20px 0;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input);
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.relay {
  background: var(--input);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}

.indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  margin: 0 auto 10px auto;
  background: var(--off);
  box-shadow: 0 0 5px var(--off);
  transition: 0.3s;
}

.indicator.on {
  background: var(--on);
  box-shadow: 0 0 10px var(--on);
}

button {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

button:hover:not(:disabled) {
  background: var(--accent-hover);
}
</style>
</head>
<body>

<div class="container">
  <h1>🌙 WLED Relay Control</h1>

  <div id="connectionStatus" class="status-bar disconnected">
    Not Connected
  </div>

  <label>WLED IP Address</label>
  <input type="text" id="ip" placeholder="192.168.1.10">

  <div class="grid">
    <div class="relay">
      <h3>Relay 0</h3>
      <div id="led0" class="indicator"></div>
      <button onclick="toggleRelay(0)">Toggle</button>
    </div>

    <div class="relay">
      <h3>Relay 1</h3>
      <div id="led1" class="indicator"></div>
      <button onclick="toggleRelay(1)">Toggle</button>
    </div>

    <div class="relay">
      <h3>Relay 2</h3>
      <div id="led2" class="indicator"></div>
      <button onclick="toggleRelay(2)">Toggle</button>
    </div>

    <div class="relay">
      <h3>Relay 3</h3>
      <div id="led3" class="indicator"></div>
      <button onclick="toggleRelay(3)">Toggle</button>
    </div>
  </div>
</div>

<script>
let ip = "";
let relayStates = [0,0,0,0];
let poller = null;

window.onload = () => {
  const savedIP = localStorage.getItem("wled_ip");
  if (savedIP) {
    document.getElementById("ip").value = savedIP;
    ip = savedIP;
    startPolling();
  }

  document.getElementById("ip").addEventListener("change", e => {
    ip = e.target.value.trim();
    localStorage.setItem("wled_ip", ip);
    startPolling();
  });
};

function setConnectionState(state) {
  const bar = document.getElementById("connectionStatus");
  const buttons = document.querySelectorAll("button");

  bar.className = "status-bar " + state;

  if (state === "connected") {
    bar.textContent = "Connected ✔️";
    buttons.forEach(b => b.disabled = false);
  } else if (state === "connecting") {
    bar.textContent = "Connecting...";
    buttons.forEach(b => b.disabled = true);
  } else {
    bar.textContent = "Disconnected ❌";
    buttons.forEach(b => b.disabled = true);
  }
}

function startPolling() {
  if (!ip) return;

  if (poller) clearInterval(poller);

  setConnectionState("connecting");
  fetchState();
  poller = setInterval(fetchState, 3000);
}

async function fetchState() {
  try {
    const res = await fetch(`http://${ip}/json`);
    const data = await res.json();

    const relays = data.state?.MultiRelay?.relays;
    if (!relays) throw new Error();

    relays.forEach(r => {
      relayStates[r.relay] = r.state ? 1 : 0;
      const led = document.getElementById("led" + r.relay);
      r.state ? led.classList.add("on") : led.classList.remove("on");
    });

    setConnectionState("connected");

  } catch {
    setConnectionState("disconnected");
  }
}

async function toggleRelay(index) {
  if (!ip) return;

  relayStates[index] = relayStates[index] ? 0 : 1;

  const switchString = relayStates.join(",");

  try {
    await fetch(`http://${ip}/relays?switch=${switchString}`);
    setTimeout(fetchState, 300);
  } catch {
    setConnectionState("disconnected");
  }
}
</script>

</body>
</html>
